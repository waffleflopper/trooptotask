name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Type check & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check
        env:
          PUBLIC_SUPABASE_URL: http://localhost:54321
          PUBLIC_SUPABASE_ANON_KEY: dummy-key-for-type-check
          PUBLIC_BILLING_ENABLED: 'false'
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          STRIPE_TEAM_PRICE_ID: price_dummy_team
          STRIPE_UNIT_PRICE_ID: price_dummy_unit

      - name: Unit tests
        run: npm test
        env:
          PUBLIC_SUPABASE_URL: http://localhost:54321
          PUBLIC_SUPABASE_ANON_KEY: dummy-key-for-type-check
          PUBLIC_BILLING_ENABLED: 'false'
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          STRIPE_TEAM_PRICE_ID: price_dummy_team
          STRIPE_UNIT_PRICE_ID: price_dummy_unit
